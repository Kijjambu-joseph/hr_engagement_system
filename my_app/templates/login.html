<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #eef1f6;
            display: grid;
            place-items: center;
            color: #1f2937;
        }
        .login-card {
            width: min(450px, calc(100% - 32px));
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            padding: 36px;
        }
        .login-card .login-logo {
            display: block;
            margin: 0 auto 28px;
            width: min(200px, 100%);
            height: auto;
        }
        .login-card form {
            max-width: 420px;
            margin: 0 auto;
        }
        .login-card h1 {
            margin: 0 0 10px;
            font-size: 1.9rem;
            letter-spacing: -0.03em;
            color: #111827;
        }
        .login-card p {
            margin: 0 0 28px;
            color: #6b7280;
            line-height: 1.6;
        }
        .field-group {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        .field-group label {
            font-size: 0.95rem;
            color: #4b5563;
        }
        .field-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 1rem;
            background: #f8fafc;
            color: #111827;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .field-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }
        .password-wrapper {
            position: relative;
            display: grid;
        }
        .password-wrapper .toggle-password {
            position: absolute;
            right: 16px;
            top: 50%;
            transform: translateY(-50%);
            border: none;
            background: transparent;
            color: #6b7280;
            cursor: pointer;
            padding: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.1rem;
            line-height: 1;
        }
        .password-wrapper .toggle-password:hover {
            color: #111827;
        }
        .forgot-link {
            display: inline-block;
            margin-bottom: 24px;
            font-size: 0.95rem;
            color: #2563eb;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-button {
            width: 100%;
            padding: 14px 16px;
            background: #2563eb;
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.17s ease, background 0.17s ease;
        }
        .login-button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .login-footer {
            margin-top: 22px;
            font-size: 0.9rem;
            color: #6b7280;
        }

		p{
			text-align: center;
			margin-top: 20px;
		}
    </style>
</head>
<body>
    {% load static %}

    <main class="login-card">
        <img src="{% static 'image/cente-removebg-preview.png' %}"
            alt="login logo" class="login-logo"</>
        
            <!-- Your updated form tag with id="loginForm", action and method removed -->
        <form id="loginForm">
            <!-- Place an empty div here to display backend errors to the user -->
            <div id="error-message" class="alert alert-danger d-none text-danger small mb-3" style="text-align: center;"></div>

            <div class="field-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="Enter your name" required />
            </div>
            <div class="field-group">
                <label for="password">Password</label>
                <div class="password-wrapper">
                    <input id="password" name="password" type="password" placeholder="Enter your password" required />
                    <button type="button" class="toggle-password" aria-label="Show password" id="togglePassword">
                        👁
                    </button>
                </div>
            </div>
            <a class="forgot-link" href="#">Forgot password?</a>
            <button class="login-button" type="submit">Login Now</button>
        </form>
            <p class="login-footer">Need help? Contact your HR team for account support.</p>
    </main> 

    
<script>
const passwordInput = document.getElementById('password');
const togglePasswordButton = document.getElementById('togglePassword');

togglePasswordButton.addEventListener('click', () => {
    const isPassword = passwordInput.type === 'password';
    passwordInput.type = isPassword ? 'text' : 'password';
    togglePasswordButton.textContent = isPassword ? '👁' : '👁';
    togglePasswordButton.setAttribute('aria-label', isPassword ? 'Hide password' : 'Show password');
});

document.getElementById('loginForm').addEventListener('submit', async (event) => {
    event.preventDefault(); // Stop page reload

    const username = document.getElementById('username').value;
    const password = passwordInput.value;
    const errorDiv = document.getElementById('error-message');
    
    errorDiv.classList.add('d-none'); // Hide error on new attempt

    try {
        const response = await fetch('/api/auth/login/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                // Include Django's CSRF token if your backend requires it
                'X-CSRFToken': '{{ csrf_token }}' 
            },
            body: JSON.stringify({ username, password })
        });

        const result = await response.json();

        if (response.ok) {
            // Store the auth token in the browser's storage
            localStorage.setItem('authToken', result.access || result.token);
            localStorage.setItem('userRole', result.role); // Save role for dashboard checks

            const redirectUrl = result.redirect_url || (result.role === 'employee' ? '/employeedash/' : '/genmanagerdash/');
            window.location.href = redirectUrl;
        } else {
            // Show error message from Django
            const errorMessage = result.error || result.detail || result.non_field_errors?.[0] || 'Invalid credentials';
            errorDiv.textContent = errorMessage;
            errorDiv.classList.remove('d-none');
        }
    } catch (error) {
        console.error('Error:', error);
        errorDiv.textContent = 'Server connection failed.';
        errorDiv.classList.remove('d-none');
    }
});
</script>

</body>
</html>
