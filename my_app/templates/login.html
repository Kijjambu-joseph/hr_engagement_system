<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login</title>
    <style>
        :root {
            color-scheme: light;
            font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        }
        body {
            margin: 0;
            min-height: 100vh;
            background: #eef1f6;
            display: grid;
            place-items: center;
            color: #1f2937;
        }
        .login-card {
            width: min(450px, calc(100% - 32px));
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 24px 80px rgba(15, 23, 42, 0.08);
            padding: 36px;
        }
        .login-card .login-logo {
            display: block;
            margin: 0 auto 28px;
            width: min(200px, 100%);
            height: auto;
        }
        .login-card form {
            max-width: 420px;
            margin: 0 auto;
        }
        .login-card h1 {
            margin: 0 0 10px;
            font-size: 1.9rem;
            letter-spacing: -0.03em;
            color: #111827;
        }
        .login-card p {
            margin: 0 0 28px;
            color: #6b7280;
            line-height: 1.6;
        }
        .field-group {
            display: grid;
            gap: 12px;
            margin-bottom: 20px;
        }
        .field-group label {
            font-size: 0.95rem;
            color: #4b5563;
        }
        .field-group input {
            width: 100%;
            padding: 14px 16px;
            border: 1px solid #d1d5db;
            border-radius: 14px;
            font-size: 1rem;
            background: #f8fafc;
            color: #111827;
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }
        .field-group input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.12);
        }
        .forgot-link {
            display: inline-block;
            margin-bottom: 24px;
            font-size: 0.95rem;
            color: #2563eb;
            text-decoration: none;
        }
        .forgot-link:hover {
            text-decoration: underline;
        }
        .login-button {
            width: 100%;
            padding: 14px 16px;
            background: #2563eb;
            border: none;
            border-radius: 14px;
            color: #ffffff;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.17s ease, background 0.17s ease;
        }
        .login-button:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
        }
        .login-footer {
            margin-top: 22px;
            font-size: 0.9rem;
            color: #6b7280;
        }

		p{
			text-align: center;
			margin-top: 20px;
		}
    </style>
</head>
<body>
    {% load static %}

    <main class="login-card">
        <img src="{% static 'image/cente-removebg-preview.png' %}"
            alt="login logo" class="login-logo"
        />
        <form method="post" action="/api/auth/login/">
            <div class="field-group">
                <label for="username">Username</label>
                <input id="username" name="username" type="text" placeholder="Enter your name" required />
            </div>
            <div class="field-group">
                <label for="password">Password</label>
                <input id="password" name="password" type="password" placeholder="Enter your password" required />
            </div>
            <a class="forgot-link" href="#">Forgot password?</a>
            <button class="login-button" type="submit">Login Now</button>
        </form>
        <p class="login-footer">Need help? Contact your HR team for account support.</p>
    </main>
</body>
</html>
