<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Employee Profile - HR Engagement System</title>

    <!-- Bootstrap -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />

    <!-- Bootstrap Icons -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"
      rel="stylesheet"
    />

    <style>
      body {
        background: #f5f7fa;
      }

      .profile-card {
        border: none;
        border-radius: 15px;
      }

      .section-title {
        font-weight: 600;
        color: #0d6efd;
      }

      .readonly-card {
        border-left: 5px solid #0d6efd;
      }

      .profile-img {
        width: 150px;
        height: 150px;
        object-fit: cover;
        border-radius: 50%;
        border: 5px solid #dee2e6;
      }

      .badge-status {
        font-size: 15px;
      }
    </style>
  </head>

  <body>
    <div class="container py-4">
      <div class="row">
        <!-- Left Profile -->
        <div class="col-lg-4 mb-4">
          <div class="card profile-card shadow">
            <div class="card-body text-center">
              <img
                src="https://via.placeholder.com/150"
                id="profilePreview"
                class="profile-img mb-3"
              />

              <h4>John Doe</h4>

              <p class="text-muted">Software Developer</p>

              <label class="btn btn-primary btn-sm">
                <i class="bi bi-camera"></i>
                Change Picture
                <input type="file" id="profileImage" hidden />
              </label>
            </div>
          </div>
        </div>

        <!-- Right Content -->
        <div class="col-lg-8">

          <!-- Editable Information -->
          <div class="card shadow mb-4">
            <div
              class="card-header bg-primary text-white d-flex justify-content-between align-items-center"
            >
              <h5 class="mb-0">
                <i class="bi bi-pencil-square"></i>
                Editable Information
              </h5>

              <div>
                <button class="btn btn-light btn-sm" id="editBtn">Edit</button>

                <button class="btn btn-success btn-sm d-none" id="saveBtn">
                  Save Changes
                </button>
              </div>
            </div>

            <div class="card-body">
              <form id="profileForm">
                <div class="row">
                  <div class="col-md-6 mb-3">
                    <label>Phone Number</label>

                    <input
                      type="text"
                      class="form-control editable"
                      value="+256700123456"
                      disabled
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Email</label>

                    <input
                      type="email"
                      class="form-control editable"
                      value="john.doe@company.com"
                      disabled
                    />
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Residential Address</label>

                    <textarea class="form-control editable" disabled>
                    Kampala, Uganda</textarea>
                    
                  </div>

                  <div class="col-md-6 mb-3">
                    <label>Emergency Contact</label>

                    <textarea class="form-control editable" disabled>
                            Jane Doe - +256701234567</textarea>
                    
                  </div>

                </div>
              </form>
            </div>
          </div>

          <!-- Read Only Information -->
           
          <div class="card shadow mb-4">
            <div class="card-header bg-secondary text-white">
              <h5 class="mb-0">
                <i class="bi bi-lock-fill"></i>
                Official HR Records 
              </h5>
            </div>

            <div class="card-body">
              <div class="row">
                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Employee Number</strong>

                      <p class="mb-0">EMP00125</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Branch</strong>

                      <p class="mb-0">Head Office</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Department</strong>

                      <p class="mb-0">ICT</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Job Title</strong>

                      <p class="mb-0">Software Developer</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Employment Type</strong>

                      <p class="mb-0">Permanent</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Date Employed</strong>

                      <p class="mb-0">15 January 2022</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Supervisor</strong>

                      <p class="mb-0">Sarah Kato</p>
                    </div>
                  </div>
                </div>

                <div class="col-md-6 mb-3">
                  <div class="card readonly-card">
                    <div class="card-body">
                      <strong>Employment Status</strong>

                      <span class="badge bg-success badge-status">
                        Active
                      </span>
                    </div>
                  </div>
                </div>
              </div>
            </div>
          </div>

         
        </div>
      </div>
    </div>

    <script>
      const editBtn = document.getElementById("editBtn");
      const saveBtn = document.getElementById("saveBtn");
      const editable = document.querySelectorAll(".editable");

      editBtn.addEventListener("click", () => {
        editable.forEach((input) => {
          input.disabled = false;
        });

        editBtn.classList.add("d-none");
        saveBtn.classList.remove("d-none");
      });

      saveBtn.addEventListener("click", () => {
        editable.forEach((input) => {
          input.disabled = true;
        });

        saveBtn.classList.add("d-none");
        editBtn.classList.remove("d-none");

        alert("Profile updated successfully!");
      });

      document
        .getElementById("profileImage")
        .addEventListener("change", function () {
          const file = this.files[0];

          if (file) {
            const reader = new FileReader();

            reader.onload = function (e) {
              document.getElementById("profilePreview").src = e.target.result;
            };

            reader.readAsDataURL(file);
          }
        });

      document
        .getElementById("togglePassword")
        .addEventListener("click", () => {
          const pass = document.getElementById("password");

          pass.type = pass.type === "password" ? "text" : "password";
        });
    </script>
  </body>
</html>
